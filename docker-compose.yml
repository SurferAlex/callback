services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    entrypoint: ["/migrate", "-path", "/migrations", "-cmd", "up"]
    restart: "no"

  vpnapi:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    restart: unless-stopped

  user_bot:
    build:
      context: ./user_bot
    env_file:
      - ./user_bot/.env
    depends_on:
      - vpnapi
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped

  miniapp:
    build:
      context: ./Surfer VPN
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.surfwave.space
    restart: unless-stopped
    ports:
      - "3000:80"

  nginx:
    image: nginx:1.27-alpine
    container_name: surfvpn-nginx
    depends_on:
      - vpnapi
      - miniapp
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    restart: unless-stopped

volumes:
  pgdata: {}
  letsencrypt: {}
  certbot_www: {}
