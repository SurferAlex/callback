services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vpn"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/migrate", "-path", "/migrations", "-cmd", "up"]
    restart: "no"

  vpnapi:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    restart: unless-stopped

  user_bot:
    build:
      context: ./user_bot
    env_file:
      - ./user_bot/.env
    depends_on:
      postgres:
        condition: service_healthy
      vpnapi:
        condition: service_started
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped

  miniapp:
    build:
      context: ./Surfer VPN
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.surfwave.space}
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
        VITE_SUB_BASE_URL: ${VITE_SUB_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "3000:80"

volumes:
  pgdata: {}
