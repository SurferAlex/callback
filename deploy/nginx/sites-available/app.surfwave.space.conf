# Кабинет / Mini App — upstream на хосте :3000
# Скопировать: sudo cp deploy/nginx/sites-available/app.surfwave.space.conf /etc/nginx/sites-available/
# sudo ln -sf /etc/nginx/sites-available/app.surfwave.space.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name app.surfwave.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.surfwave.space;

    # certbot --nginx -d app.surfwave.space
    ssl_certificate     /etc/letsencrypt/live/app.surfwave.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.surfwave.space/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam           /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3000;
    }
}
