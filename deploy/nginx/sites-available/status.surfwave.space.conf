# Uptime Kuma — upstream на хосте :3001 (WebSockets)
# Скопировать: sudo cp deploy/nginx/sites-available/status.surfwave.space.conf /etc/nginx/sites-available/
# sudo ln -sf /etc/nginx/sites-available/status.surfwave.space.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name status.surfwave.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name status.surfwave.space;

    ssl_certificate     /etc/letsencrypt/live/status.surfwave.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/status.surfwave.space/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam           /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_pass http://127.0.0.1:3001;
    }
}
